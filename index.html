<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life RPG V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/console.png">
    
    <style>
        /* Corrección para iOS: Permitir scroll natural pero evitar rebote elástico excesivo */
        html { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #0f0f0f; 
            color: #e0e0e0; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            -webkit-user-select: none; /* Evita seleccionar texto al tocar rápido */
        }
        
        /* Contenedor principal con scroll suave */
        #main-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 100px; /* Espacio para el menú */
        }

        .tab-content { display: none; animation: fadeIn 0.2s; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Inputs y Botones mejorados para dedo */
        input, textarea { 
            background: #1e1e1e; border: 1px solid #333; color: white; 
            border-radius: 10px; padding: 14px; width: 100%; font-size: 16px; margin-bottom: 8px; 
        }
        input:focus, textarea:focus { outline: none; border-color: #3b82f6; background: #252525; }
        
        .card { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #2a2a2a; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .btn-main { background: #2563eb; color: white; font-weight: bold; padding: 14px; border-radius: 10px; width: 100%; text-align: center; active: scale(0.98); transition: transform 0.1s; }
        .btn-small { padding: 8px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; }

        /* Barra de Navegación Fija */
        .nav-bar { 
            background: rgba(20, 20, 20, 0.95); 
            border-top: 1px solid #333; 
            padding: 12px 0 30px 0; /* Extra padding para iPhone X/11/12+ */
            display: flex; justify-content: space-around; 
            backdrop-filter: blur(10px);
        }
        .nav-item { color: #555; text-align: center; font-size: 10px; flex: 1; }
        .nav-item.active { color: #3b82f6; }
        .nav-item svg { width: 26px; height: 26px; margin: 0 auto 4px; display: block; }

        /* Estilos RPG */
        .xp-bar-bg { background: #333; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .xp-bar-fill { background: #fbbf24; height: 100%; width: 0%; transition: width 0.3s; }
        
        /* Checkbox personalizado */
        .custom-check { width: 24px; height: 24px; border: 2px solid #555; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .checked { background: #22c55e; border-color: #22c55e; }
    </style>
</head>
<body>

    <div class="px-5 pt-14 pb-4 bg-black/80 sticky top-0 z-50 backdrop-blur-md border-b border-gray-800 flex justify-between items-center">
        <div>
            <div class="text-xs text-gray-400 font-mono" id="dateDisplay">CARGANDO...</div>
            <h1 class="text-2xl font-black tracking-tight text-white">Josema<span class="text-blue-500">RPG</span></h1>
        </div>
        <div class="text-right">
            <div class="text-yellow-400 font-bold text-xl">LVL <span id="lvl-display">1</span></div>
            <div class="w-24 xp-bar-bg"><div id="xp-bar" class="xp-bar-fill"></div></div>
        </div>
    </div>

    <div id="main-container" class="px-4 py-4">

        <div id="tab-profile" class="tab-content active-tab">
            <div class="card grid grid-cols-3 gap-2 text-center">
                <div><div class="text-2xl">🦁</div><div class="text-xs text-gray-400 mt-1">Físico</div><div id="stat-fisico" class="font-bold text-lg">0</div></div>
                <div><div class="text-2xl">🧠</div><div class="text-xs text-gray-400 mt-1">Intelecto</div><div id="stat-int" class="font-bold text-lg">0</div></div>
                <div><div class="text-2xl">❤️</div><div class="text-xs text-gray-400 mt-1">Vida</div><div id="stat-vida" class="font-bold text-lg">100%</div></div>
            </div>

            <div class="flex justify-between items-center mb-2 mt-6">
                <h2 class="text-lg font-bold text-white">Hábitos Diarios</h2>
                <button onclick="newHabitPrompt()" class="text-blue-400 text-sm font-bold">+ Crear Nuevo</button>
            </div>
            <div id="habits-list" class="space-y-2">
                </div>

            <div class="mt-8 text-center">
                 <button onclick="exportData()" class="text-xs text-gray-600 border border-gray-800 px-3 py-1 rounded">💾 Guardar Backup</button>
            </div>
        </div>

        <div id="tab-tasks" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Tablón de Misiones</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="task-input" placeholder="Nueva misión...">
                <button onclick="addTask()" class="bg-blue-600 text-white rounded-xl px-5 font-bold text-xl shadow-lg shadow-blue-900/50">+</button>
            </div>
            <div id="task-list" class="space-y-3"></div>
        </div>

        <div id="tab-gym" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Log de Entrenamiento</h2>
            <div class="card">
                <input type="text" id="gym-ex" placeholder="Ejercicio (ej. Sentadilla)">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="gym-kg" placeholder="Kg" inputmode="decimal">
                    <input type="number" id="gym-reps" placeholder="Reps" inputmode="numeric">
                </div>
                <button onclick="addGymLog()" class="btn-main mt-2 bg-red-600 shadow-lg shadow-red-900/50">REGISTRAR SERIE</button>
            </div>
            <div id="gym-log-list" class="space-y-2 text-sm text-gray-400 mt-4 pb-12"></div>
        </div>

        <div id="tab-food" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Cocina & Macros</h2>
            
            <div class="card bg-gray-800 border-gray-700">
                <div class="flex justify-between text-center">
                    <div><span class="block text-blue-400 font-bold text-xl" id="total-prot">0</span><span class="text-xs text-gray-500">PROT</span></div>
                    <div><span class="block text-yellow-400 font-bold text-xl" id="total-carb">0</span><span class="text-xs text-gray-500">CARB</span></div>
                    <div><span class="block text-red-400 font-bold text-xl" id="total-fat">0</span><span class="text-xs text-gray-500">GRASA</span></div>
                    <div><span class="block text-white font-bold text-xl" id="total-cal">0</span><span class="text-xs text-gray-500">KCAL</span></div>
                </div>
            </div>

            <div class="card">
                <h3 class="text-xs uppercase text-gray-500 mb-2 font-bold">Comida Rápida</h3>
                <input type="text" id="food-name" placeholder="¿Qué has comido?">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="food-p" placeholder="P" class="text-center">
                    <input type="number" id="food-c" placeholder="C" class="text-center">
                    <input type="number" id="food-f" placeholder="F" class="text-center">
                </div>
                <button onclick="addFood()" class="btn-main mt-2 bg-green-600">AÑADIR (+Nutrición)</button>
            </div>

            <div class="flex justify-between items-center mt-8 mb-4">
                <h3 class="font-bold text-white">Mi Recetario</h3>
                <button onclick="toggleRecipeForm()" class="text-green-400 text-sm font-bold">+ Nueva Receta</button>
            </div>

            <div id="recipe-form" class="hidden card border-green-900 bg-green-900/10">
                <input type="text" id="rec-title" placeholder="Nombre del plato">
                <textarea id="rec-desc" rows="3" placeholder="Ingredientes y pasos..."></textarea>
                <button onclick="saveRecipe()" class="btn-small bg-green-600 text-white w-full">Guardar en Libro</button>
            </div>

            <div id="recipe-list" class="space-y-3">
                </div>
        </div>

    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('tab-profile', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            YO
        </div>
        <div class="nav-item" onclick="switchTab('tab-tasks', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
            MISIONES
        </div>
        <div class="nav-item" onclick="switchTab('tab-gym', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            GYM
        </div>
        <div class="nav-item" onclick="switchTab('tab-food', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            COCINA
        </div>
    </nav>

    <script>
        // CONFIG
        const todayStr = new Date().toLocaleDateString('es-ES');
        document.getElementById('dateDisplay').textContent = todayStr.toUpperCase();

        // BASE DE DATOS
        let db = {
            stats: { lvl: 1, xp: 0, fisico: 0, int: 0 },
            tasks: [],
            gym: [],
            food: [],
            habitsDef: ["Leer 10 min", "Beber Agua"], // Hábitos por defecto
            habitsLog: {}, // Registro diario de hábitos: { "20/10/2023": ["Leer 10 min"] }
            recipes: [] 
        };

        // CARGAR DATOS
        const saved = localStorage.getItem('josema_rpg_v2');
        if(saved) db = JSON.parse(saved);

        // RENDER INICIAL
        renderAll();

        // --- FUNCIONES UI ---
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleRecipeForm() {
            document.getElementById('recipe-form').classList.toggle('hidden');
        }

        // --- LÓGICA CORE ---
        function saveData() {
            localStorage.setItem('josema_rpg_v2', JSON.stringify(db));
            renderAll();
        }

        function addXP(amount) {
            db.stats.xp += amount;
            if(db.stats.xp >= 100 * db.stats.lvl) {
                db.stats.xp = 0;
                db.stats.lvl++;
                alert("¡NIVEL SUBIDO! 🆙");
            }
            saveData();
        }

        function renderAll() {
            // Stats
            document.getElementById('lvl-display').innerText = db.stats.lvl;
            document.getElementById('stat-fisico').innerText = db.stats.fisico;
            document.getElementById('stat-int').innerText = db.stats.int;
            // Barra XP
            let maxXp = 100 * db.stats.lvl;
            let pct = (db.stats.xp / maxXp) * 100;
            document.getElementById('xp-bar').style.width = pct + '%';

            // 1. RENDER HÁBITOS
            const hList = document.getElementById('habits-list');
            hList.innerHTML = '';
            // Inicializar log de hoy si no existe
            if(!db.habitsLog[todayStr]) db.habitsLog[todayStr] = [];
            
            db.habitsDef.forEach(habitName => {
                const isDone = db.habitsLog[todayStr].includes(habitName);
                hList.innerHTML += `
                    <div onclick="toggleHabit('${habitName}')" class="card p-3 flex justify-between items-center active:bg-gray-800 transition">
                        <span class="font-medium">${habitName}</span>
                        <div class="custom-check ${isDone ? 'checked' : ''}">
                            ${isDone ? '<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>' : ''}
                        </div>
                    </div>
                `;
            });

            // 2. RENDER TAREAS
            const tList = document.getElementById('task-list');
            tList.innerHTML = '';
            db.tasks.forEach((t, i) => {
                tList.innerHTML += `
                    <div class="card p-4 flex justify-between items-center">
                        <span class="${t.done ? 'line-through text-gray-600' : 'text-white'}">${t.text}</span>
                        <button onclick="toggleTask(${i})" class="w-8 h-8 rounded-full border border-gray-600 flex items-center justify-center ${t.done ? 'bg-blue-600 border-blue-600' : ''}">
                           ${t.done ? '✓' : ''}
                        </button>
                    </div>`;
            });

            // 3. RENDER GYM
            const gList = document.getElementById('gym-log-list');
            gList.innerHTML = db.gym.slice(0, 8).map(g => 
                `<div class="flex justify-between border-b border-gray-800 py-2">
                    <span class="text-white">${g.ex}</span>
                    <span class="text-blue-400 font-mono">${g.kg}kg <span class="text-gray-500">x</span> ${g.reps}</span>
                </div>`
            ).join('');

            // 4. RENDER FOOD
            const fList = document.getElementById('recipe-list');
            fList.innerHTML = '';
            // Totales
            let todayFood = db.food.filter(f => f.date === todayStr);
            let p=0, c=0, f=0;
            todayFood.forEach(item => { p+=Number(item.p); c+=Number(item.c); f+=Number(item.f); });
            document.getElementById('total-prot').innerText = p;
            document.getElementById('total-carb').innerText = c;
            document.getElementById('total-fat').innerText = f;
            document.getElementById('total-cal').innerText = (p*4 + c*4 + f*9);

            // Lista Recetas
            if(db.recipes) {
                db.recipes.forEach((r, i) => {
                    fList.innerHTML += `
                        <div class="card relative">
                            <h4 class="font-bold text-lg text-green-400">${r.title}</h4>
                            <p class="text-sm text-gray-400 mt-1 whitespace-pre-line">${r.desc}</p>
                            <button onclick="deleteRecipe(${i})" class="absolute top-2 right-2 text-red-500 text-xs">Borrar</button>
                        </div>
                    `;
                });
            }
        }

        // --- ACCIONES ---

        // Hábitos
        function newHabitPrompt() {
            const name = prompt("Nombre del nuevo hábito:");
            if(name) {
                db.habitsDef.push(name);
                saveData();
            }
        }
        function toggleHabit(name) {
            const idx = db.habitsLog[todayStr].indexOf(name);
            if(idx > -1) {
                db.habitsLog[todayStr].splice(idx, 1); // Desmarcar
            } else {
                db.habitsLog[todayStr].push(name); // Marcar
                addXP(5);
            }
            saveData();
        }

        // Tareas
        function addTask() {
            const input = document.getElementById('task-input');
            if(input.value) {
                db.tasks.unshift({ text: input.value, done: false });
                input.value = '';
                saveData();
            }
        }
        function toggleTask(i) {
            db.tasks[i].done = !db.tasks[i].done;
            if(db.tasks[i].done) { addXP(10); db.stats.int++; }
            saveData();
        }

        // Gym
        function addGymLog() {
            const ex = document.getElementById('gym-ex').value;
            const kg = document.getElementById('gym-kg').value;
            const reps = document.getElementById('gym-reps').value;
            if(ex) {
                db.gym.unshift({ ex, kg, reps, date: todayStr });
                addXP(8);
                db.stats.fisico += 2;
                document.getElementById('gym-kg').value = '';
                document.getElementById('gym-reps').value = '';
                saveData();
            }
        }

        // Comida y Recetas
        function addFood() {
            const name = document.getElementById('food-name').value;
            const p = document.getElementById('food-p').value || 0;
            const c = document.getElementById('food-c').value || 0;
            const f = document.getElementById('food-f').value || 0;
            if(name) {
                db.food.push({ name, p, c, f, date: todayStr });
                document.getElementById('food-name').value = '';
                saveData();
            }
        }
        function saveRecipe() {
            const title = document.getElementById('rec-title').value;
            const desc = document.getElementById('rec-desc').value;
            if(title) {
                if(!db.recipes) db.recipes = [];
                db.recipes.push({ title, desc });
                toggleRecipeForm();
                saveData();
            }
        }
        function deleteRecipe(i) {
            if(confirm('¿Borrar receta?')) {
                db.recipes.splice(i, 1);
                saveData();
            }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "josema_backup.json");
            document.body.appendChild(dl);
            dl.click();
            dl.remove();
        }
    </script>
</body>
</html>
