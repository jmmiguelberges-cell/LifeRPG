<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life RPG V2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/96/console.png">
    
    <style>
        /* Estilos Base */
        html { height: 100%; overflow: hidden; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f0f0f; color: #e0e0e0; height: 100%; display: flex; flex-direction: column;
            -webkit-user-select: none;
        }
        
        /* Contenedor con Scroll */
        #main-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 90px; }
        
        /* Animaciones */
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Elements */
        input, select, textarea { 
            background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 12px; 
            padding: 12px; width: 100%; font-size: 16px; margin-bottom: 8px; appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: #3b82f6; background: #252525; }
        
        .card { background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #262626; position: relative; }
        .btn-main { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; font-weight: bold; padding: 14px; border-radius: 12px; width: 100%; text-align: center; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* Sub-Navegación (Físico) */
        .sub-nav { display: flex; gap: 8px; margin-bottom: 16px; background: #1a1a1a; padding: 4px; border-radius: 12px; }
        .sub-nav-btn { flex: 1; text-align: center; padding: 8px; font-size: 14px; border-radius: 8px; color: #666; font-weight: 600; }
        .sub-nav-btn.active { background: #333; color: white; shadow: 0 2px 4px rgba(0,0,0,0.2); }

        /* Navegación Inferior */
        .nav-bar { 
            background: rgba(15, 15, 15, 0.95); border-top: 1px solid #333; 
            padding: 10px 0 30px 0; display: flex; justify-content: space-around; 
            backdrop-filter: blur(10px); position: absolute; bottom: 0; width: 100%; z-index: 50;
        }
        .nav-item { color: #555; text-align: center; font-size: 10px; flex: 1; transition: color 0.2s; }
        .nav-item.active { color: #3b82f6; }
        .nav-item svg { width: 24px; height: 24px; margin: 0 auto 4px; display: block; }
        
        /* Gráfica */
        canvas { max-height: 200px; width: 100%; }
    </style>
</head>
<body>

    <div class="px-5 pt-14 pb-4 bg-black/80 sticky top-0 z-40 backdrop-blur-md border-b border-gray-800 flex justify-between items-center">
        <div>
            <div class="text-[10px] text-blue-400 font-bold tracking-wider" id="dateDisplay">CARGANDO...</div>
            <h1 class="text-2xl font-black text-white">Josema<span class="text-blue-600">RPG</span> <span class="text-xs bg-gray-800 px-2 py-0.5 rounded text-gray-400 font-normal">V2.0</span></h1>
        </div>
        <div class="text-right">
            <div class="text-yellow-400 font-bold text-xl">LVL <span id="lvl-display">1</span></div>
            <div class="w-24 bg-gray-800 h-1.5 rounded-full mt-1 overflow-hidden">
                <div id="xp-bar" class="bg-yellow-400 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <div id="main-container" class="px-4 py-4">

        <div id="tab-profile" class="tab-content active-tab">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="card bg-gradient-to-br from-gray-900 to-gray-800 border-none">
                    <div class="text-2xl mb-1">🦁</div>
                    <div class="text-xs text-gray-400 uppercase font-bold">Físico</div>
                    <div id="stat-fisico" class="text-xl font-bold text-white">0</div>
                </div>
                <div class="card bg-gradient-to-br from-gray-900 to-gray-800 border-none">
                    <div class="text-2xl mb-1">🧠</div>
                    <div class="text-xs text-gray-400 uppercase font-bold">Mente</div>
                    <div id="stat-int" class="text-xl font-bold text-white">0</div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-2 mt-6">
                <h2 class="text-lg font-bold text-white">Racha de Hábitos 🔥</h2>
                <button onclick="newHabitPrompt()" class="text-blue-400 text-xs font-bold bg-blue-900/30 px-2 py-1 rounded">+ Nuevo</button>
            </div>
            <div id="habits-list" class="space-y-2"></div>
            
            <div class="mt-8 text-center">
                 <button onclick="exportData()" class="text-xs text-gray-500 underline">Guardar Backup (JSON)</button>
            </div>
        </div>

        <div id="tab-fisico" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Centro de Entrenamiento</h2>
            
            <div class="sub-nav">
                <div class="sub-nav-btn active" onclick="switchSubTab('sub-gym', this)">🏋️ Gym</div>
                <div class="sub-nav-btn" onclick="switchSubTab('sub-cardio', this)">🏃 Correr</div>
                <div class="sub-nav-btn" onclick="switchSubTab('sub-movilidad', this)">🧘 Movilidad</div>
            </div>

            <div id="sub-gym" class="sub-tab-content block">
                <div class="card border-blue-900/50 bg-blue-900/10">
                    <div class="flex justify-between mb-2">
                        <label class="text-xs font-bold text-blue-400 uppercase">1. Rutina</label>
                        <button onclick="configRoutines()" class="text-xs text-gray-400">⚙️ Configurar</button>
                    </div>
                    <select id="gym-routine-select" onchange="updateExerciseDropdown()" class="mb-3 font-bold bg-gray-900">
                        <option value="">Selecciona rutina...</option>
                    </select>

                    <label class="text-xs font-bold text-blue-400 uppercase">2. Ejercicio</label>
                    <select id="gym-exercise-select" onchange="loadChartData()" class="mb-3 bg-gray-900">
                        <option value="">-- Primero elige rutina --</option>
                    </select>

                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="text-[10px] text-gray-500">KG</label>
                            <input type="number" id="gym-kg" placeholder="0" class="text-center font-bold text-lg">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500">REPS</label>
                            <input type="number" id="gym-reps" placeholder="0" class="text-center font-bold text-lg">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500">RPE (1-10)</label>
                            <input type="number" id="gym-rpe" placeholder="-" class="text-center text-gray-400">
                        </div>
                    </div>
                    <button onclick="logGymSet()" class="btn-main mt-2 shadow-lg shadow-blue-900/40">REGISTRAR SERIE (+XP)</button>
                </div>

                <div class="card p-2" id="chart-container" style="display:none;">
                    <h3 class="text-xs text-center text-gray-500 mb-2">PROGRESO (KG)</h3>
                    <canvas id="gymChart"></canvas>
                </div>

                <h3 class="text-xs font-bold text-gray-500 mt-6 mb-2">HOY</h3>
                <div id="gym-log-today" class="space-y-2"></div>
            </div>

            <div id="sub-cardio" class="sub-tab-content hidden">
                <div class="card">
                    <label class="text-xs font-bold text-green-400 uppercase">Tipo de Cardio</label>
                    <select id="cardio-type" class="bg-gray-900 mb-3">
                        <option>Carrera Suave</option>
                        <option>Series / Intervalos</option>
                        <option>Cinta / Elíptica</option>
                        <option>Caminar</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="cardio-km" placeholder="Distancia (km)">
                        <input type="number" id="cardio-time" placeholder="Tiempo (min)">
                    </div>
                    <button onclick="logCardio()" class="btn-main bg-green-600 mt-2">GUARDAR SESIÓN</button>
                </div>
                <div id="cardio-log-list" class="space-y-2 mt-4"></div>
            </div>

            <div id="sub-movilidad" class="sub-tab-content hidden">
                <div class="card text-center py-8">
                    <div class="text-4xl mb-2">🧘</div>
                    <p class="text-gray-400 mb-4">Cronómetro de Movilidad</p>
                    <input type="number" id="mob-min" placeholder="Minutos" class="text-center w-24 mx-auto block">
                    <button onclick="logMobility()" class="btn-main mt-4 bg-purple-600 w-1/2 mx-auto block">Finalizar</button>
                </div>
            </div>
        </div>

        <div id="tab-food" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Cocina</h2>
            <div class="card bg-gray-800">
                <div class="flex justify-between text-center">
                    <div><span class="block text-blue-400 font-bold text-xl" id="total-prot">0</span><span class="text-xs">PROT</span></div>
                    <div><span class="block text-yellow-400 font-bold text-xl" id="total-carb">0</span><span class="text-xs">CARB</span></div>
                    <div><span class="block text-red-400 font-bold text-xl" id="total-fat">0</span><span class="text-xs">GRASA</span></div>
                    <div><span class="block text-white font-bold text-xl" id="total-cal">0</span><span class="text-xs">KCAL</span></div>
                </div>
            </div>
            <div class="card">
                <input type="text" id="food-name" placeholder="Alimento...">
                <div class="grid grid-cols-3 gap-2">
                    <input type="number" id="food-p" placeholder="P" class="text-center">
                    <input type="number" id="food-c" placeholder="C" class="text-center">
                    <input type="number" id="food-f" placeholder="F" class="text-center">
                </div>
                <button onclick="addFood()" class="btn-main mt-2 bg-green-700">COMER</button>
            </div>
            <div id="food-log-list" class="space-y-2 mt-4"></div>
        </div>

    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('tab-profile', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            YO
        </div>
        <div class="nav-item" onclick="switchTab('tab-fisico', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            FÍSICO
        </div>
        <div class="nav-item" onclick="switchTab('tab-food', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            COCINA
        </div>
    </nav>

    <script>
        // --- 1. BASE DE DATOS E INICIALIZACIÓN ---
        const todayStr = new Date().toLocaleDateString('es-ES');
        document.getElementById('dateDisplay').textContent = todayStr.toUpperCase();

        // Estructura de Datos V2
        let db = {
            stats: { lvl: 1, xp: 0, fisico: 0, int: 0 },
            routines: {
                "Pecho y Espalda": ["Press Banca", "Remo Barra", "Dominadas", "Aperturas"],
                "Pierna": ["Sentadilla", "Prensa", "Peso Muerto Rumano", "Extensiones"],
                "Hombro y Brazo": ["Press Militar", "Elevaciones Laterales", "Curl Biceps", "Triceps Polea"]
            },
            gymLogs: [], // { date, routine, exercise, kg, reps, rpe }
            cardioLogs: [],
            food: [],
            habitsDef: ["Leer 10 min", "Creatina", "No Alcohol"],
            habitsLog: {}
        };

        // Cargar datos antiguos y migrar si es necesario
        const saved = localStorage.getItem('josema_rpg_v2');
        if(saved) {
            const parsed = JSON.parse(saved);
            // Fusionamos por si faltan campos nuevos
            db = { ...db, ...parsed };
            // Asegurar que routines existe
            if(!db.routines) db.routines = { "Full Body": ["Sentadilla", "Flexiones", "Dominadas"] };
        }

        // Gráfico Global
        let myChart = null;

        // --- 2. FUNCIONES DE INTERFAZ ---
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function switchSubTab(id, el) {
            document.querySelectorAll('.sub-tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.sub-tab-content').forEach(t => t.classList.remove('block'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('block');
            document.querySelectorAll('.sub-nav-btn').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // --- 3. LÓGICA GYM AVANZADA ---
        
        // Cargar Selector de Rutinas
        function loadRoutinesUI() {
            const sel = document.getElementById('gym-routine-select');
            sel.innerHTML = '<option value="">Selecciona rutina...</option>';
            Object.keys(db.routines).forEach(rName => {
                sel.innerHTML += `<option value="${rName}">${rName}</option>`;
            });
        }

        // Al cambiar rutina, cargar ejercicios
        function updateExerciseDropdown() {
            const routineName = document.getElementById('gym-routine-select').value;
            const exSel = document.getElementById('gym-exercise-select');
            exSel.innerHTML = '<option value="">-- Elige ejercicio --</option>';
            
            if(db.routines[routineName]) {
                db.routines[routineName].forEach(ex => {
                    exSel.innerHTML += `<option value="${ex}">${ex}</option>`;
                });
            }
        }

        // Registrar Serie
        function logGymSet() {
            const routine = document.getElementById('gym-routine-select').value;
            const ex = document.getElementById('gym-exercise-select').value;
            const kg = document.getElementById('gym-kg').value;
            const reps = document.getElementById('gym-reps').value;
            const rpe = document.getElementById('gym-rpe').value;

            if(!routine || !ex || !kg || !reps) {
                alert("Faltan datos (Rutina, Ejercicio, Peso o Reps)");
                return;
            }

            // Guardar
            db.gymLogs.push({ date: todayStr, routine, ex, kg, reps, rpe, timestamp: Date.now() });
            
            // Gamificación
            addXP(10);
            db.stats.fisico += 1;
            
            saveData();
            loadChartData(); // Actualizar gráfica
            renderGymLogsToday();
        }

        // --- 4. SISTEMA DE GRÁFICAS (CHART.JS) ---
        function loadChartData() {
            const exName = document.getElementById('gym-exercise-select').value;
            if(!exName) {
                document.getElementById('chart-container').style.display = 'none';
                return;
            }

            // Filtrar logs de este ejercicio
            const logs = db.gymLogs.filter(l => l.ex === exName);
            if(logs.length === 0) return;

            document.getElementById('chart-container').style.display = 'block';

            // Preparar datos para gráfica (Últimas 10 sesiones)
            // Agrupamos por fecha (tomamos el peso máximo de cada día)
            const sessionsMap = {};
            logs.forEach(l => {
                if(!sessionsMap[l.date] || Number(l.kg) > Number(sessionsMap[l.date])) {
                    sessionsMap[l.date] = l.kg;
                }
            });

            const labels = Object.keys(sessionsMap).slice(-10); // Últimas 10 fechas
            const dataPoints = Object.values(sessionsMap).slice(-10);

            // Destruir gráfica anterior si existe
            if(myChart) myChart.destroy();

            // Crear nueva gráfica
            const ctx = document.getElementById('gymChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Peso Máximo (Kg)',
                        data: dataPoints,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#333' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // --- 5. RENDERIZADO GENERAL ---
        function renderAll() {
            // Stats Header
            document.getElementById('lvl-display').innerText = db.stats.lvl;
            document.getElementById('stat-fisico').innerText = db.stats.fisico;
            document.getElementById('stat-int').innerText = db.stats.int;
            document.getElementById('xp-bar').style.width = ((db.stats.xp / (100 * db.stats.lvl)) * 100) + '%';

            // Hábitos
            const hList = document.getElementById('habits-list');
            hList.innerHTML = '';
            if(!db.habitsLog[todayStr]) db.habitsLog[todayStr] = [];
            
            db.habitsDef.forEach(h => {
                const isDone = db.habitsLog[todayStr].includes(h);
                hList.innerHTML += `
                    <div onclick="toggleHabit('${h}')" class="card p-3 flex justify-between items-center ${isDone ? 'border-green-500/50 bg-green-900/10' : ''}">
                        <span>${h}</span>
                        <div class="w-6 h-6 rounded border ${isDone ? 'bg-green-500 border-green-500' : 'border-gray-500'} flex items-center justify-center">
                            ${isDone ? '✓' : ''}
                        </div>
                    </div>`;
            });

            renderGymLogsToday();
            renderFood();
        }

        function renderGymLogsToday() {
            const list = document.getElementById('gym-log-today');
            list.innerHTML = '';
            // Logs de hoy, ordenados por recientes
            const todayLogs = db.gymLogs.filter(l => l.date === todayStr).reverse();
            
            todayLogs.forEach((l, idx) => {
                list.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-800 py-2 text-sm">
                        <div>
                            <span class="text-blue-400 font-bold">${l.ex}</span>
                            <div class="text-xs text-gray-500">${l.routine}</div>
                        </div>
                        <div class="font-mono text-white">${l.kg}kg x ${l.reps}</div>
                    </div>`;
            });
        }

        function renderFood() {
            // Totales de hoy
            let todayFood = db.food.filter(f => f.date === todayStr);
            let p=0, c=0, f=0;
            todayFood.forEach(i => { p+=Number(i.p); c+=Number(i.c); f+=Number(i.f); });
            document.getElementById('total-prot').innerText = p;
            document.getElementById('total-carb').innerText = c;
            document.getElementById('total-fat').innerText = f;
            document.getElementById('total-cal').innerText = (p*4 + c*4 + f*9);
            
            const list = document.getElementById('food-log-list');
            list.innerHTML = todayFood.map(item => 
                `<div class="flex justify-between py-2 border-b border-gray-800 text-sm"><span>${item.name}</span><span class="text-gray-500">${item.p}p ${item.c}c ${item.f}f</span></div>`
            ).join('');
        }

        // --- 6. CORE LOGIC ---
        function addXP(amount) {
            db.stats.xp += amount;
            if(db.stats.xp >= 100 * db.stats.lvl) {
                db.stats.xp = 0; db.stats.lvl++; alert("¡NIVEL UP! 🎉");
            }
            saveData();
        }

        function saveData() {
            localStorage.setItem('josema_rpg_v2', JSON.stringify(db));
            renderAll();
        }

        function toggleHabit(name) {
            const idx = db.habitsLog[todayStr].indexOf(name);
            if(idx > -1) db.habitsLog[todayStr].splice(idx, 1);
            else { db.habitsLog[todayStr].push(name); addXP(5); }
            saveData();
        }

        function addFood() {
            const name = document.getElementById('food-name').value;
            const p = document.getElementById('food-p').value || 0;
            const c = document.getElementById('food-c').value || 0;
            const f = document.getElementById('food-f').value || 0;
            if(name) {
                db.food.push({ name, p, c, f, date: todayStr });
                document.getElementById('food-name').value = '';
                addXP(5);
                saveData();
            }
        }

        function configRoutines() {
            const routineName = prompt("Crear nueva rutina (Nombre):");
            if(routineName) {
                const exercises = prompt("Escribe los ejercicios separados por coma (ej: Press, Remo, Curl):");
                if(exercises) {
                    const exArray = exercises.split(',').map(e => e.trim());
                    db.routines[routineName] = exArray;
                    alert("Rutina creada. Selecciónala en el menú.");
                    loadRoutinesUI();
                    saveData();
                }
            }
        }
        
        function newHabitPrompt() {
            const h = prompt("Nuevo hábito:");
            if(h) { db.habitsDef.push(h); saveData(); }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "josema_rpg_backup.json");
            document.body.appendChild(dl); dl.click(); dl.remove();
        }

        // INIT
        loadRoutinesUI();
        renderAll();

    </script>
</body>
</html>
