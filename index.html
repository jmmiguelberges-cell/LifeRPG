<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life RPG - Motor del Tiempo V1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: -apple-system, sans-serif; -webkit-user-select: none; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Pestañas Superiores */
        .tab-nav { display: flex; background: #1a1a1a; padding: 4px; border-radius: 12px; margin: 0 16px 12px 16px; }
        .tab-btn { flex: 1; text-align: center; padding: 10px; font-size: 14px; font-weight: bold; color: #666; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4); }

        /* Cuadrícula del Calendario */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 16px; }
        .day-cell { 
            /* Celdas más altas para que quepa el número y el turno */
            min-height: 65px; 
            background: #1a1a1a; border-radius: 8px; border: 1px solid #2a2a2a;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 4px; font-size: 14px; font-weight: bold; position: relative;
        }
        .day-cell:active { transform: scale(0.95); background: #252525; }
        .day-cell.empty { background: transparent; border: none; pointer-events: none; }
        
        /* Turno y Puntito */
        .shift-label { font-size: 11px; color: #9ca3af; font-weight: 800; margin-top: 2px; }
        .task-dot { width: 6px; height: 6px; background: #f97316; border-radius: 50%; margin-top: auto; margin-bottom: 6px; box-shadow: 0 0 4px #f97316; }

        /* Estado del día */
        .day-cell.today { background: #1e3a8a; border-color: #3b82f6; }
        .day-cell.today .shift-label { color: #bfdbfe; }
        
        /* Inputs y Vistas */
        .view-section { display: none; flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .view-section.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { background: #252525; border: 1px solid #333; color: white; border-radius: 10px; padding: 14px; width: 100%; font-size: 16px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .btn-blue { background: #2563eb; color: white; font-weight: bold; padding: 12px 20px; border-radius: 10px; }
        .btn-icon { background: #1f2937; color: white; padding: 8px 16px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="px-5 pt-12 pb-4 border-b border-gray-800 mb-4">
        <h1 class="text-2xl font-black text-white">Agenda<span class="text-blue-500">RPG</span></h1>
    </div>

    <div class="tab-nav">
        <button id="btn-tab-month" onclick="switchView('month')" class="tab-btn active">📅 Visión Mes</button>
        <button id="btn-tab-day" onclick="switchView('day')" class="tab-btn">📝 Visión Día</button>
    </div>

    <div id="view-month" class="view-section active">
        <div class="flex justify-between items-center px-6 py-2 mb-2">
            <button onclick="changeMonth(-1)" class="btn-icon">&lt;</button>
            <h2 id="month-display" class="text-lg font-bold uppercase tracking-widest text-white">Mes Año</h2>
            <button onclick="changeMonth(1)" class="btn-icon">&gt;</button>
        </div>

        <div class="grid grid-cols-7 gap-1 px-4 text-center text-[10px] font-bold text-gray-500 uppercase mb-2">
            <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
        </div>
        
        <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <div id="view-day" class="view-section px-4">
        <div class="flex justify-between items-center bg-gray-900 rounded-xl p-2 mb-6 border border-gray-800">
            <button onclick="changeDay(-1)" class="btn-icon bg-gray-800">&lt;</button>
            <div class="text-center">
                <h2 id="day-display" class="text-lg font-bold text-white">Fecha</h2>
                <p id="day-status" class="text-[10px] font-bold text-blue-400 uppercase tracking-wider">Hoy</p>
            </div>
            <button onclick="changeDay(1)" class="btn-icon bg-gray-800">&gt;</button>
        </div>
        
        <div class="mb-4 flex items-center gap-2 bg-blue-900/20 border border-blue-900/50 p-3 rounded-xl">
            <span class="text-xl">🏭</span>
            <div>
                <div class="text-[10px] text-gray-400 font-bold uppercase">Turno de Trabajo</div>
                <div id="day-shift-display" class="font-bold text-blue-400">Calculando...</div>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <input type="text" id="new-task-input" placeholder="Añadir misión o nota para este día...">
            <button onclick="addTask()" class="btn-blue">+</button>
        </div>

        <div id="day-tasks-list" class="space-y-2"></div>
    </div>

    <script>
        /* --- BASE DE DATOS --- */
        let dbTime = JSON.parse(localStorage.getItem('josema_rpg_time_v2')) || {};

        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const dayNames = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

        // Estados
        let viewMonthDate = new Date(); // Para el calendario
        let selectedDayDate = new Date(); // Para la vista de Día
        const realToday = new Date();

        // Helper para sacar la llave YYYY-MM-DD segura
        function getStrDate(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        /* --- NAVEGACIÓN DE VISTAS --- */
        function switchView(viewName) {
            document.getElementById('view-month').classList.remove('active');
            document.getElementById('view-day').classList.remove('active');
            document.getElementById('btn-tab-month').classList.remove('active');
            document.getElementById('btn-tab-day').classList.remove('active');

            if(viewName === 'month') {
                document.getElementById('view-month').classList.add('active');
                document.getElementById('btn-tab-month').classList.add('active');
                renderCalendar();
            } else {
                document.getElementById('view-day').classList.add('active');
                document.getElementById('btn-tab-day').classList.add('active');
                renderDayView();
            }
        }

        /* --- VISTA 1: CALENDARIO --- */
        function renderCalendar() {
            const year = viewMonthDate.getFullYear();
            const month = viewMonthDate.getMonth();
            document.getElementById('month-display').innerText = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let startDay = firstDayOfMonth === 0 ? 6 : firstDayOfMonth - 1;

            for (let i = 0; i < startDay; i++) {
                grid.innerHTML += `<div class="day-cell empty"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const iterDate = new Date(year, month, day, 12, 0, 0); // Las 12:00 evita bugs de zona horaria
                const dateStr = getStrDate(iterDate);
                const dayOfWeek = iterDate.getDay();
                
                // ¿Es hoy?
                const isToday = (dateStr === getStrDate(realToday));
                
                // PRUEBA DE TURNO: Lunes(1) a Viernes(5) ponemos "TT"
                let shiftText = "";
                if (dayOfWeek >= 1 && dayOfWeek <= 5) {
                    shiftText = "TT";
                }

                // ¿Hay tareas?
                const hasTasks = dbTime[dateStr] && dbTime[dateStr].length > 0;

                grid.innerHTML += `
                    <div onclick="selectDayFromCalendar(${year}, ${month}, ${day})" 
                         class="day-cell ${isToday ? 'today' : ''}">
                        <span>${day}</span>
                        ${shiftText ? `<span class="shift-label">${shiftText}</span>` : ''}
                        ${hasTasks ? `<div class="task-dot"></div>` : ''}
                    </div>
                `;
            }
        }

        function changeMonth(step) {
            viewMonthDate.setMonth(viewMonthDate.getMonth() + step);
            renderCalendar();
        }

        function selectDayFromCalendar(y, m, d) {
            selectedDayDate = new Date(y, m, d, 12, 0, 0);
            switchView('day');
        }

        /* --- VISTA 2: DÍA --- */
        function renderDayView() {
            const dateStr = getStrDate(selectedDayDate);
            const isToday = dateStr === getStrDate(realToday);
            
            // Textos Cabecera
            const dName = dayNames[selectedDayDate.getDay()];
            const dNum = selectedDayDate.getDate();
            const mName = monthNames[selectedDayDate.getMonth()];
            document.getElementById('day-display').innerText = `${dName}, ${dNum} ${mName}`;
            
            // Estado (Hoy, Pasado, Futuro)
            const statusEl = document.getElementById('day-status');
            selectedDayDate.setHours(0,0,0,0);
            const todayZero = new Date(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
            
            if (selectedDayDate.getTime() === todayZero.getTime()) {
                statusEl.innerText = "🔥 HOY"; statusEl.className = "text-[10px] font-bold text-red-500 uppercase";
            } else if (selectedDayDate < todayZero) {
                statusEl.innerText = "Pasado"; statusEl.className = "text-[10px] font-bold text-gray-500 uppercase";
            } else {
                statusEl.innerText = "Planificación"; statusEl.className = "text-[10px] font-bold text-blue-500 uppercase";
            }

            // Simulación de Turno en el detalle
            const dw = selectedDayDate.getDay();
            if(dw >= 1 && dw <= 5) {
                document.getElementById('day-shift-display').innerText = "TT (Turno de Prueba)";
                document.getElementById('day-shift-display').className = "font-bold text-yellow-500";
            } else {
                document.getElementById('day-shift-display').innerText = "Libre / Fin de semana";
                document.getElementById('day-shift-display').className = "font-bold text-green-500";
            }

            // Render Tareas
            const list = document.getElementById('day-tasks-list');
            list.innerHTML = '';
            const tasks = dbTime[dateStr] || [];
            
            if (tasks.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-600 text-sm mt-6 italic">Agenda limpia para este día.</p>`;
                return;
            }

            tasks.forEach((t, idx) => {
                list.innerHTML += `
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                        <span class="${t.done ? 'line-through text-gray-600' : 'text-white'} flex-1">${t.text}</span>
                        <div class="flex gap-2">
                            <button onclick="toggleTask(${idx})" class="w-8 h-8 rounded border border-gray-600 flex items-center justify-center ${t.done ? 'bg-green-600 border-green-600' : ''}">
                                ${t.done ? '✓' : ''}
                            </button>
                            <button onclick="deleteTask(${idx})" class="text-red-500 bg-red-900/20 px-3 rounded font-bold">X</button>
                        </div>
                    </div>
                `;
            });
        }

        function changeDay(step) {
            selectedDayDate.setDate(selectedDayDate.getDate() + step);
            // También actualizamos el mes del calendario para que si volvemos, estemos en el mes correcto
            viewMonthDate = new Date(selectedDayDate); 
            renderDayView();
        }

        function addTask() {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (!text) return;

            const dateStr = getStrDate(selectedDayDate);
            if (!dbTime[dateStr]) dbTime[dateStr] = [];
            
            dbTime[dateStr].push({ text: text, done: false });
            input.value = '';
            
            localStorage.setItem('josema_rpg_time_v2', JSON.stringify(dbTime));
            renderDayView();
        }

        function toggleTask(idx) {
            const dateStr = getStrDate(selectedDayDate);
            dbTime[dateStr][idx].done = !dbTime[dateStr][idx].done;
            localStorage.setItem('josema_rpg_time_v2', JSON.stringify(dbTime));
            renderDayView();
        }

        function deleteTask(idx) {
            const dateStr = getStrDate(selectedDayDate);
            dbTime[dateStr].splice(idx, 1);
            if (dbTime[dateStr].length === 0) delete dbTime[dateStr];
            localStorage.setItem('josema_rpg_time_v2', JSON.stringify(dbTime));
            renderDayView();
        }

        // INIT
        renderCalendar();
    </script>
</body>
</html>
